name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ─────────────────────────────────────────────
  # Decide whether to build installers
  # Artifacts are only built for minor/major bumps (patch == 0)
  # e.g. v0.7.0 → build, v0.6.1 → skip
  # ─────────────────────────────────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      build_artifacts: ${{ steps.check.outputs.build_artifacts }}
    steps:
      - id: check
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          if [ "$PATCH" = "0" ]; then
            echo "build_artifacts=true" >> "$GITHUB_OUTPUT"
            echo "Patch is 0 — building installer artifacts"
          else
            echo "build_artifacts=false" >> "$GITHUB_OUTPUT"
            echo "Patch release ($VERSION) — skipping installer artifacts"
          fi

  # ─────────────────────────────────────────────
  # Build desktop for all three platforms
  # ─────────────────────────────────────────────
  build-windows:
    needs: check-version
    if: needs.check-version.outputs.build_artifacts == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Stamp version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('desktop/package.json'));p.version='$VERSION';fs.writeFileSync('desktop/package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Stamped desktop/package.json → $VERSION"

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (Windows)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --win

      - uses: actions/upload-artifact@v4
        with:
          name: dist-win
          retention-days: 1
          path: |
            desktop/dist/*.exe
            desktop/dist/latest.yml

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.build_artifacts == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('desktop/package.json'));p.version='$VERSION';fs.writeFileSync('desktop/package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Stamped desktop/package.json → $VERSION"

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (macOS)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --mac

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          retention-days: 1
          path: |
            desktop/dist/*.dmg
            desktop/dist/latest-mac.yml

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.build_artifacts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('desktop/package.json'));p.version='$VERSION';fs.writeFileSync('desktop/package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Stamped desktop/package.json → $VERSION"

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (Linux)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --linux

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          retention-days: 1
          path: |
            desktop/dist/*.AppImage
            desktop/dist/latest-linux.yml

  # ─────────────────────────────────────────────
  # Create GitHub Release and attach artifacts (if any)
  # ─────────────────────────────────────────────
  github-release:
    needs: [check-version, build-windows, build-macos, build-linux]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        if: needs.check-version.outputs.build_artifacts == 'true'
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_ARTIFACTS: ${{ needs.check-version.outputs.build_artifacts }}
        run: |
          gh release delete "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --yes 2>/dev/null || true
          if [ "$BUILD_ARTIFACTS" = "true" ]; then
            gh release create "$GITHUB_REF_NAME" artifacts/** \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
