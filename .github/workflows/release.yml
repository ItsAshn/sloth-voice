name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ─────────────────────────────────────────────
  # Build desktop for all three platforms
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (Windows)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --win

      - uses: actions/upload-artifact@v4
        with:
          name: dist-win
          path: |
            desktop/dist/*.exe
            desktop/dist/latest.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (macOS)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --mac

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          path: |
            desktop/dist/*.dmg
            desktop/dist/latest-mac.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (Linux)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --linux

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: |
            desktop/dist/*.AppImage
            desktop/dist/latest-linux.yml

  # ─────────────────────────────────────────────
  # Create GitHub Release and attach all artifacts
  # ─────────────────────────────────────────────
  github-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true

  # ─────────────────────────────────────────────
  # Tag discard-server → triggers its docker-publish workflow
  # Requires a PAT secret named DISPATCH_TOKEN with repo scope
  # on ItsAshn/discard-server (Settings → Secrets → Actions)
  # ─────────────────────────────────────────────
  dispatch-server:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Create matching tag in discard-server
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          SHA=$(gh api repos/ItsAshn/discard-server/git/ref/heads/master --jq '.object.sha')
          # Create tag (or force-update if it already exists)
          gh api repos/ItsAshn/discard-server/git/refs \
            -f ref="refs/tags/$TAG" \
            -f sha="$SHA" \
            2>/dev/null \
          || gh api "repos/ItsAshn/discard-server/git/refs/tags/$TAG" \
            -X PATCH \
            -f sha="$SHA" \
            -F force=true
          echo "Tagged discard-server at $TAG ($SHA)"
