name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ─────────────────────────────────────────────
  # Build desktop for all three platforms
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Stamp version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('desktop/package.json'));p.version='$VERSION';fs.writeFileSync('desktop/package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Stamped desktop/package.json → $VERSION"

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (Windows)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --win

      - uses: actions/upload-artifact@v4
        with:
          name: dist-win
          path: |
            desktop/dist/*.exe
            desktop/dist/latest.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('desktop/package.json'));p.version='$VERSION';fs.writeFileSync('desktop/package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Stamped desktop/package.json → $VERSION"

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (macOS)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --mac

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          path: |
            desktop/dist/*.dmg
            desktop/dist/latest-mac.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('desktop/package.json'));p.version='$VERSION';fs.writeFileSync('desktop/package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Stamped desktop/package.json → $VERSION"

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (Linux)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --linux

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: |
            desktop/dist/*.AppImage
            desktop/dist/latest-linux.yml

  # ─────────────────────────────────────────────
  # Create GitHub Release and attach all artifacts
  # ─────────────────────────────────────────────
  github-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/** \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --clobber

  # ─────────────────────────────────────────────
  # Trigger docker-publish workflow in discard-server
  # Requires a PAT secret named DISPATCH_TOKEN with
  # Actions: Write permission on ItsAshn/discard-server
  # (Settings → Secrets → Actions in this repo)
  # ─────────────────────────────────────────────
  dispatch-server:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docker-publish in discard-server
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh workflow run docker-publish.yml \
            --repo ItsAshn/discard-server \
            --ref master \
            --field version="${GITHUB_REF_NAME}"
          echo "Triggered discard-server docker-publish for ${GITHUB_REF_NAME}"
