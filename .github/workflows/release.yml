name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ─────────────────────────────────────────────
  # Desktop builds
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Stamp version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('desktop/package.json'));p.version='$VERSION';fs.writeFileSync('desktop/package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Stamped desktop/package.json → $VERSION"

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (Windows)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # GH_TOKEN lets electron-builder publish to GitHub Releases directly
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --win

      - uses: actions/upload-artifact@v4
        with:
          name: dist-win
          retention-days: 1
          path: |
            desktop/dist/*.exe
            desktop/dist/latest.yml

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('desktop/package.json'));p.version='$VERSION';fs.writeFileSync('desktop/package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Stamped desktop/package.json → $VERSION"

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (macOS)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --mac

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          retention-days: 1
          path: |
            desktop/dist/*.dmg
            desktop/dist/latest-mac.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('desktop/package.json'));p.version='$VERSION';fs.writeFileSync('desktop/package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Stamped desktop/package.json → $VERSION"

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build (Linux)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --linux

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          retention-days: 1
          path: |
            desktop/dist/*.AppImage
            desktop/dist/latest-linux.yml

  # ─────────────────────────────────────────────
  # Android APK (unsigned, sideload)
  # ─────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('mobile/package.json'));p.version='$VERSION';fs.writeFileSync('mobile/package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Stamped mobile/package.json → $VERSION"

      - name: Generate native Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --clean

      - name: Build unsigned APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK_SRC="mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_DST="mobile/android/app/build/outputs/apk/release/Sloth-Voice-${VERSION}.apk"
          mv "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-android
          retention-days: 1
          path: mobile/android/app/build/outputs/apk/release/*.apk

  # ─────────────────────────────────────────────
  # Create GitHub Release and attach all artifacts
  # ─────────────────────────────────────────────
  github-release:
    needs: [build-windows, build-macos, build-linux, build-android]
    if: always() && !cancelled() && !failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --yes 2>/dev/null || true
          gh release create "$GITHUB_REF_NAME" artifacts/** \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
