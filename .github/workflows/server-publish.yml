name: Publish Server Docker Image

on:
  push:
    tags:
      - "server-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build and publish (e.g. v0.5.0)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: itsashn/sloth-voice-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump versions and commit
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ inputs.version || github.ref_name }}"
          # Strip leading v/V and also strip "server-" prefix if present
          VERSION_NUM=$(echo "$TAG" | sed 's/^server-//' | sed 's/^[vV]//')
          echo "Tag: $TAG  Version: $VERSION_NUM"
          git fetch origin master
          git checkout master
          # Update server/package.json version
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('server/package.json'));p.version='$VERSION_NUM';fs.writeFileSync('server/package.json',JSON.stringify(p,null,2)+'\n')"
          # Update server/docker-compose.yml image tag
          sed -i "s|image: ghcr.io/itsashn/sloth-voice-server:.*|image: ghcr.io/itsashn/sloth-voice-server:v${VERSION_NUM}|" server/docker-compose.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/package.json server/docker-compose.yml
          git diff --staged --quiet || git commit -m "chore: bump server to v${VERSION_NUM} [skip ci]"
          git push origin master

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ inputs.version || github.ref_name }}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}/server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
