name: Publish server Docker image

on:
  push:
    tags:
      - "server-v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: itsashn/discard-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#server-}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_num=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Bump package.json and docker-compose versions
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd server
          # Update package.json version
          npm version ${{ steps.version.outputs.version_num }} --no-git-tag-version
          # Update docker-compose.yml image tag to pinned version
          sed -i "s|image: ghcr.io/itsashn/discard-server:.*|image: ghcr.io/itsashn/discard-server:${{ steps.version.outputs.version }}|" docker-compose.yml

      - name: Commit version bumps
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/package.json server/docker-compose.yml
          git diff --staged --quiet || git commit -m "chore: bump versions to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:refs/heads/master

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # always tag the latest release as :latest
            type=raw,value=latest
            # strip the "server-" prefix from version tags → :v1.2.3
            type=match,pattern=server-(v\d+\.\d+\.\d+.*),group=1
            # also tag the git SHA for traceability
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
