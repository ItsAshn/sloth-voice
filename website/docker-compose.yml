services:
  website:
    image: ghcr.io/itsashn/sloth-voice-website:latest
    # uncomment the block below to build locally instead of pulling from GHCR
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "${WEBSITE_PORT:-3000}:3000"
    networks:
      cloudflareTunnel:
        ipv4_address: 172.18.0.6
networks:
  cloudflareTunnel:
    external: true
