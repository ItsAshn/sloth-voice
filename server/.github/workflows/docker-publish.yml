name: Publish Docker image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build and publish (e.g. v1.2.3)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: itsashn/discard-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump versions and commit
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ inputs.version || github.ref_name }}"
          VERSION_NUM=$(echo "$TAG" | sed 's/^[vV]//')
          echo "Tag: $TAG  Version: $VERSION_NUM"
          # Switch to main and apply version bumps there
          git fetch origin master
          git checkout master
          # Update package.json version
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$VERSION_NUM';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          # Update docker-compose.yml image tag to pinned version
          sed -i "s|image: ghcr.io/itsashn/discard-server:.*|image: ghcr.io/itsashn/discard-server:${TAG}|" docker-compose.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json docker-compose.yml
          git diff --staged --quiet || git commit -m "chore: bump versions to ${TAG} [skip ci]"
          git push origin master

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # always tag the latest release as :latest
            type=raw,value=latest
            # version tags from a git tag push → :v1.2.3, :1.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # version tag when triggered via workflow_dispatch
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            # also tag the git SHA for traceability
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
